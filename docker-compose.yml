version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vitruvio_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-vitruvio_db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      - db
    networks:
      - vitruvio_network

  db:
    image: postgres:15-alpine
    container_name: vitruvio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vitruvio_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    networks:
      - vitruvio_network

networks:
  vitruvio_network:
    driver: bridge

volumes:
  pgsql_data: